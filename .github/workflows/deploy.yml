name: Deploy to Hostinger via FTP

on:
    push:
        branches:
            - main
    workflow_dispatch:

jobs:
    ftp-deploy:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: "20"
                  cache: "npm"

            - name: Install dependencies
              run: npm ci

            - name: Build production bundle
              run: npm run build

            - name: Verify build output
              run: |
                  echo "Checking dist directory contents..."
                  ls -la dist/
                  echo "Build completed successfully!"

            - name: Debug FTP Configuration
              run: |
                  echo "FTP Host is configured: ${{ secrets.FTP_HOST != '' }}"
                  echo "FTP Username is configured: ${{ secrets.FTP_USERNAME != '' }}"
                  echo "FTP Password is configured: ${{ secrets.FTP_PASSWORD != '' }}"
                  echo "FTP Port is configured: ${{ secrets.FTP_PORT != '' }}"

            - name: Deploy via FTP
              uses: SamKirkland/FTP-Deploy-Action@v4.3.5
              with:
                  server: ${{ secrets.FTP_HOST }}
                  username: ${{ secrets.FTP_USERNAME }}
                  password: ${{ secrets.FTP_PASSWORD }}
                  port: ${{ secrets.FTP_PORT }}
                  local-dir: ./dist/
                  server-dir: public_html/
                  dangerous-clean-slate: true
                  log-level: verbose
                  exclude: |
                      **/.git*
                      **/.git*/**
                      **/node_modules/**
                      .gitignore
